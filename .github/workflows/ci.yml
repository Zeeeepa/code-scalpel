name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

# Restrict permissions for security
permissions:
  contents: read

jobs:
  # [20251214_FEATURE] Fast smoke gate - runs first to catch obvious issues quickly
  smoke:
    name: Smoke Test (Fast Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff pytest
        pip install -e . || pip install -r requirements.txt

    - name: Smoke import (policy engine)
      run: |
        python -c "import code_scalpel.policy_engine.policy_engine; print('policy-engine-import-ok')"

    - name: Check formatting (Black)
      run: black --check --diff src/ tests/

    - name: Lint (Ruff) - src/ only
      run: ruff check src/

    - name: Run smoke tests
      run: |
        pytest tests/core/test_code_analyzer.py -q --tb=short -x
    
    - name: Smoke gate summary
      if: failure()
      run: |
        echo "::error::Smoke gate failed. Fix lint/format issues before full CI runs."
        echo "Run locally: python -m ruff check . && python -m black --check ."

  lint:
    name: Lint (Black & Ruff)
    runs-on: ubuntu-latest
    needs: [smoke]  # [20251214_FEATURE] Gate behind smoke
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff

    - name: Auto-fix and verify Black formatting
      run: |
        # Apply black auto-fix first (idempotent, deterministic)
        black src/ tests/
        # Verify — should always pass after auto-fix unless syntax errors exist
        if ! black --check src/ tests/; then
          echo "::error::Black formatting failed even after auto-fix. Likely a syntax error."
          exit 1
        fi
        # Report if auto-fix changed anything
        if ! git diff --quiet -- src/ tests/; then
          echo "::warning::Black auto-fixed formatting in CI. Run 'black .' locally and commit the changes."
          git diff --stat -- src/ tests/
        else
          echo "✅ No formatting changes needed."
        fi

    - name: Auto-fix and verify Ruff linting
      run: |
        # Apply safe auto-fixes (unused imports, fixable style issues)
        ruff check --fix src/ tests/ || true
        # Verify — unfixable issues will still surface
        if ! ruff check src/ tests/; then
          echo "::error::Ruff found issues that cannot be auto-fixed. Fix manually."
          exit 1
        fi
        # Report if auto-fix changed anything
        if ! git diff --quiet -- src/ tests/; then
          echo "::warning::Ruff auto-fixed linting issues in CI. Run 'ruff check --fix .' locally and commit."
          git diff --stat -- src/ tests/
        else
          echo "✅ No ruff fixes needed."
        fi

  typecheck:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies + Pyright
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyright

    - name: Run Pyright
      run: |
        pyright -p pyrightconfig.json

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [smoke]  # [20251214_FEATURE] Gate behind smoke
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']  # [20251218_BUGFIX] Dropped 3.9 - dependencies require 3.10+
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # [20251214_PERF] Cache pip dependencies
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        pip install -e .
    
    # [20260120_SECURITY] Inject test licenses from GitHub Secrets
    - name: Setup test licenses for tier testing
      run: |
        mkdir -p tests/licenses
        echo "${{ secrets.TEST_PRO_LICENSE_JWT }}" > tests/licenses/code_scalpel_license_pro_20260101_190345.jwt
        echo "${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}" > tests/licenses/code_scalpel_license_enterprise_20260101_190754.jwt
        echo "${{ secrets.TEST_PRO_LICENSE_BROKEN_JWT }}" > tests/licenses/code_scalpel_license_pro_test_broken.jwt
        echo "${{ secrets.TEST_ENTERPRISE_LICENSE_BROKEN_JWT }}" > tests/licenses/code_scalpel_license_enterprise_test_broken.jwt
      env:
        TEST_PRO_LICENSE_JWT: ${{ secrets.TEST_PRO_LICENSE_JWT }}
        TEST_ENTERPRISE_LICENSE_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}
        TEST_PRO_LICENSE_BROKEN_JWT: ${{ secrets.TEST_PRO_LICENSE_BROKEN_JWT }}
        TEST_ENTERPRISE_LICENSE_BROKEN_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_BROKEN_JWT }}
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing \
          --ignore=tests/coverage/ \
          --ignore=tests/mcp_tool_verification/ \
          --ignore=tests/security/test_sandbox.py \
          --ignore=tests/mcp/test_low_rate_paths.py \
          --ignore=tests/mcp/test_rest_api_server.py \
          --ignore=tests/mcp/test_rest_api_server_additional.py \
          --ignore=tests/integration/test_v151_integration.py
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    needs: [smoke]  # [20251214_FEATURE] Gate behind smoke
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # [20251214_PERF] Cache pip dependencies
    
    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    
    - name: Run Bandit security scan
      run: |
        bandit -r src/ -ll -ii -x '**/test_*.py' --format json --output bandit-report.json || true
        bandit -r src/ -ll -ii -x '**/test_*.py' || true
    
    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build

    - name: Twine check
      run: |
        python -m twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Run pip-audit
      run: |
        pip-audit -r requirements-secure.txt --format json --output pip-audit-report.json
        pip-audit -r requirements-secure.txt

    - name: Upload pip-audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        path: pip-audit-report.json

  distribution-verification:
    name: Distribution Separation Verification
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run distribution separation verification
      run: |
        python scripts/verify_distribution_separation.py || true

    - name: Verify tier checks present
      run: |
        echo "Verifying tier restriction checks are in place..."
        grep -r "_get_current_tier()" src/code_scalpel/mcp/server.py || (echo "ERROR: Tier checks missing" && exit 1)
        echo "✓ Tier checks verified"

  mcp-contract:
    name: MCP Contract (All Tools)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 15
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        transport: ["stdio", "streamable-http", "sse"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest anyio httpx
        pip install -e .

    - name: Run contract test
      env:
        MCP_CONTRACT_TRANSPORT: ${{ matrix.transport }}
        MCP_CONTRACT_ARTIFACT_DIR: ${{ runner.temp }}/mcp-contract/${{ matrix.transport }}
      run: |
        pytest -q tests/mcp/test_mcp_all_tools_contract.py

    - name: Upload MCP contract evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcp-contract-${{ matrix.transport }}
        path: ${{ runner.temp }}/mcp-contract/${{ matrix.transport }}

  mcp-tools-reference:
    name: Docs (MCP Tools Reference Up-to-date)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    # [20260202_FIX] Non-blocking: requires license JWTs to regenerate; warns if stale
    continue-on-error: true
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Setup test licenses for docs generation
      run: |
        mkdir -p tests/licenses
        echo "${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}" > tests/licenses/code_scalpel_license_enterprise_20260101_190754.jwt
      env:
        TEST_ENTERPRISE_LICENSE_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}

    - name: Regenerate MCP tools reference
      id: regen_reference
      env:
        CODE_SCALPEL_DOC_PROJECT_ROOT: ${{ runner.temp }}/mcp-tools-docgen
        TEST_ENTERPRISE_LICENSE_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}
      run: |
        mkdir -p "$CODE_SCALPEL_DOC_PROJECT_ROOT"
        if python scripts/generate_mcp_tools_reference.py; then
          echo "regen_ok=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Doc regeneration failed (license JWT may be invalid/expired in CI secrets). Verifying committed file only."
          echo "regen_ok=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Verify docs/reference/mcp_tools_current.md is committed and unchanged
      shell: bash
      run: |
        set -euo pipefail

        TARGET="docs/reference/mcp_tools_current.md"

        # File must exist and be tracked in git
        if [[ ! -f "$TARGET" ]]; then
          echo "::error::$TARGET not found. Commit it by running: python scripts/generate_mcp_tools_reference.py"
          exit 1
        fi
        if ! git ls-files --error-unmatch "$TARGET" &>/dev/null; then
          echo "::error::$TARGET exists but is not tracked by git. Run: git add -f $TARGET && git commit"
          exit 1
        fi

        # If regeneration was skipped (invalid JWT), just verify the committed file is clean
        if [[ "${{ steps.regen_reference.outputs.regen_ok }}" != "true" ]]; then
          echo "::warning::Freshness check skipped — license unavailable. Committed file exists and is tracked. ✅"
          exit 0
        fi

        # Regeneration succeeded — diff must be empty
        if [[ -n "$(git status --porcelain -- "$TARGET")" ]]; then
          echo "::error::$TARGET is out of date. Regenerate and commit it:"
          echo "  python scripts/generate_mcp_tools_reference.py && git add -f $TARGET && git commit"
          git --no-pager diff -- "$TARGET" || true
          exit 1
        fi

        echo "✅ $TARGET is up-to-date"

  mcp-tools-tier-matrix:
    name: Docs (MCP Tools Tier Matrix Up-to-date)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    # [20260202_FIX] Non-blocking: requires license JWTs to regenerate; warns if stale
    continue-on-error: true
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Setup test licenses for docs generation
      run: |
        mkdir -p tests/licenses
        echo "${{ secrets.TEST_PRO_LICENSE_JWT }}" > tests/licenses/code_scalpel_license_pro_20260101_190345.jwt
        echo "${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}" > tests/licenses/code_scalpel_license_enterprise_20260101_190754.jwt
      env:
        TEST_PRO_LICENSE_JWT: ${{ secrets.TEST_PRO_LICENSE_JWT }}
        TEST_ENTERPRISE_LICENSE_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}

    - name: Regenerate MCP tools tier matrix
      id: regen_tier_matrix
      env:
        CODE_SCALPEL_DOC_PROJECT_ROOT: ${{ runner.temp }}/mcp-tools-docgen
        TEST_PRO_LICENSE_JWT: ${{ secrets.TEST_PRO_LICENSE_JWT }}
        TEST_ENTERPRISE_LICENSE_JWT: ${{ secrets.TEST_ENTERPRISE_LICENSE_JWT }}
      run: |
        mkdir -p "$CODE_SCALPEL_DOC_PROJECT_ROOT"
        if python scripts/generate_mcp_tier_matrix.py; then
          echo "regen_ok=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Tier matrix regeneration failed (license JWTs may be invalid/expired in CI secrets). Verifying committed file only."
          echo "regen_ok=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Verify docs/reference/mcp_tools_by_tier.md is committed and unchanged
      shell: bash
      run: |
        set -euo pipefail

        TARGET="docs/reference/mcp_tools_by_tier.md"

        # File must exist and be tracked in git
        if [[ ! -f "$TARGET" ]]; then
          echo "::error::$TARGET not found. Commit it by running: python scripts/generate_mcp_tier_matrix.py"
          exit 1
        fi
        if ! git ls-files --error-unmatch "$TARGET" &>/dev/null; then
          echo "::error::$TARGET exists but is not tracked by git. Run: git add -f $TARGET && git commit"
          exit 1
        fi

        # If regeneration was skipped (invalid JWT), just verify the committed file is clean
        if [[ "${{ steps.regen_tier_matrix.outputs.regen_ok }}" != "true" ]]; then
          echo "::warning::Freshness check skipped — license unavailable. Committed file exists and is tracked. ✅"
          exit 0
        fi

        # Regeneration succeeded — diff must be empty
        if [[ -n "$(git status --porcelain -- "$TARGET")" ]]; then
          echo "::error::$TARGET is out of date. Regenerate and commit it:"
          echo "  python scripts/generate_mcp_tier_matrix.py && git add -f $TARGET && git commit"
          git --no-pager diff -- "$TARGET" || true
          exit 1
        fi

        echo "✅ $TARGET is up-to-date"
  docs-sync-validation:
    name: Docs Sync Validation (README matches code)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Validate documentation sync
      env:
        CODE_SCALPEL_DOC_PROJECT_ROOT: ${{ runner.temp }}/docs-validation
      run: |
        mkdir -p "$CODE_SCALPEL_DOC_PROJECT_ROOT"
        python scripts/validate_docs_sync.py

  encoding-validation:
    name: Unicode Encoding Validation (Windows compatibility)
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validate write_text/read_text encoding
      run: |
        python scripts/validate_encoding.py

  # [20260218_FEATURE] Content accuracy gate — catches stale versions, dead links,
  # hardcoded pricing, and other website drift before it ships
  content-check:
    name: Website Content Accuracy
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run content accuracy checks
      run: |
        python scripts/check_release_content.py
      # Use --strict once baseline is fully clean; advisory for now
      continue-on-error: false

  # [20260218_FEATURE] Link validation — verify no dead internal/external links in
  # the built website. Advisory-only at first (continue-on-error: true).
  link-validation:
    name: Link Validation
    runs-on: ubuntu-latest
    needs: [content-check]
    timeout-minutes: 15
    permissions:
      contents: read
    continue-on-error: true  # Advisory — tighten to false after baseline is clean

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linkchecker
      run: pip install linkchecker

    - name: Validate internal links in website source
      run: |
        # Check docs markdown for broken cross-references
        python scripts/check_links.py --dir website/docs --ext .md || true

    - name: Validate website HTML links (static analysis)
      run: |
        python - <<'EOF'
        import re, sys
        from pathlib import Path

        website = Path("website")
        pages = list(website.rglob("*.html"))
        broken = []
        href_re = re.compile(r'href=["\']([^"\'#?]+)["\']')

        for page in pages:
            text = page.read_text(errors="replace")
            for m in href_re.finditer(text):
                href = m.group(1)
                if href.startswith(("http://", "https://", "mailto:", "//")):
                    continue  # external — skip (would need live check)
                # Resolve relative internal path
                resolved = (page.parent / href).resolve()
                if not resolved.exists() and not href.startswith("/"):
                    broken.append(f"{page.relative_to(website)}  →  {href}")

        if broken:
            print(f"⚠️  {len(broken)} potentially broken internal link(s):")
            for b in broken[:20]:
                print(f"   {b}")
            if len(broken) > 20:
                print(f"   ... and {len(broken) - 20} more")
            # Non-fatal for now — exit 0 while continue-on-error: true
        else:
            print("✅ All internal HTML links resolve.")
        EOF
